<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منصة الأستاذ نواف البدراني - إدارة الطلاب</title>
  <style>
    *{box-sizing:border-box}
    :root{
      --bg1:#081225;
      --bg2:#1b2d4a;
      --card:rgba(7,18,39,.88);
      --card2:rgba(255,255,255,.05);
      --text:#ffffff;
      --muted:#cbd5e1;
      --line:rgba(255,255,255,.08);
      --green:#22c55e;
      --green-d:#16a34a;
      --red:#ef4444;
      --red-d:#dc2626;
      --blue:#3b82f6;
      --blue-d:#2563eb;
      --gold:#f59e0b;
      --input:#f3f4f6;
      --inputText:#111827;
      --shadow:0 12px 30px rgba(0,0,0,.22);
      --radius:22px;
    }

    body{
      margin:0;
      font-family:Tahoma, Arial, sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
    }

    header{
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(8px);
      padding:24px 16px;
      text-align:center;
      box-shadow:0 4px 20px rgba(0,0,0,.22);
    }

    .title{
      font-size:32px;
      font-weight:700;
      margin:0;
    }

    .sub{
      margin-top:8px;
      color:var(--muted);
      font-size:16px;
    }

    .wrap{
      max-width:1250px;
      margin:28px auto;
      padding:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:380px 1fr;
      gap:20px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:22px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }

    h2{
      margin:0 0 18px;
      font-size:24px;
    }

    .field{
      margin-bottom:14px;
    }

    .label{
      display:block;
      margin-bottom:8px;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
    }

    input, select{
      width:100%;
      padding:15px 14px;
      border:none;
      outline:none;
      border-radius:14px;
      background:var(--input);
      color:var(--inputText);
      font-size:16px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-size:15px;
      cursor:pointer;
      color:#fff;
      transition:.18s;
      font-weight:700;
    }

    button:hover{transform:translateY(-1px)}
    .btn-add{background:var(--green)}
    .btn-add:hover{background:var(--green-d)}
    .btn-save{background:var(--blue)}
    .btn-save:hover{background:var(--blue-d)}
    .btn-cancel{background:#64748b}
    .btn-clear{background:var(--red)}
    .btn-clear:hover{background:var(--red-d)}
    .btn-delete{background:var(--red)}
    .btn-edit{background:var(--gold); color:#111827}

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .stats{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .stat{
      background:var(--card2);
      border:1px solid var(--line);
      padding:12px 14px;
      border-radius:16px;
      min-width:140px;
    }

    .stat-num{
      font-size:24px;
      font-weight:700;
    }

    .stat-label{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }

    .searchbar{
      display:grid;
      grid-template-columns:1.5fr 1fr 1fr;
      gap:12px;
      margin-bottom:18px;
    }

    .student-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .student{
      display:grid;
      grid-template-columns:1fr auto;
      gap:14px;
      padding:16px;
      border-radius:18px;
      background:var(--card2);
      border:1px solid var(--line);
    }

    .student-name{
      font-size:22px;
      font-weight:700;
      margin-bottom:6px;
    }

    .meta{
      color:var(--muted);
      font-size:14px;
      display:flex;
      flex-wrap:wrap;
      gap:8px 14px;
    }

    .actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .actions button{
      padding:10px 14px;
      font-size:14px;
      border-radius:12px;
    }

    .empty{
      padding:20px;
      text-align:center;
      color:var(--muted);
      font-size:18px;
      background:var(--card2);
      border-radius:18px;
      border:1px dashed var(--line);
    }

    .hint{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
    }

    .badge{
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(34,197,94,.15);
      color:#86efac;
      font-size:12px;
      font-weight:700;
    }

    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
    }

    @media (max-width: 700px){
      .title{font-size:23px}
      .sub{font-size:14px}
      .searchbar{grid-template-columns:1fr}
      .row{grid-template-columns:1fr}
      .student{grid-template-columns:1fr}
      .student-name{font-size:19px}
      .topbar{align-items:flex-start}
    }
  </style>
</head>
<body>
  <header>
    <div class="title">منصة الأستاذ نواف البدراني</div>
    <div class="sub">المرحلة الأولى — إدارة الطلاب</div>
  </header>

  <div class="wrap">
    <div class="grid">
      <section class="card">
        <h2 id="formTitle">إضافة طالب جديد</h2>

        <div class="field">
          <label class="label">اسم الطالب</label>
          <input id="studentName" type="text" placeholder="مثال: أحمد الغامدي">
        </div>

        <div class="row">
          <div class="field">
            <label class="label">الصف</label>
            <select id="studentGrade">
              <option value="">اختر الصف</option>
              <option>الأول متوسط</option>
              <option>الثاني متوسط</option>
              <option>الثالث متوسط</option>
              <option>الأول ثانوي</option>
              <option>الثاني ثانوي</option>
              <option>الثالث ثانوي</option>
            </select>
          </div>

          <div class="field">
            <label class="label">الشعبة</label>
            <select id="studentClass">
              <option value="">اختر الشعبة</option>
              <option>أ</option>
              <option>ب</option>
              <option>ج</option>
              <option>د</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label class="label">رقم ولي الأمر</label>
          <input id="parentPhone" type="tel" placeholder="05xxxxxxxx">
        </div>

        <div class="btns">
          <button id="mainBtn" class="btn-add" onclick="submitStudent()">إضافة الطالب</button>
          <button id="cancelBtn" class="btn-cancel" onclick="cancelEdit()" style="display:none;">إلغاء التعديل</button>
        </div>

        <div class="hint">
          البيانات محفوظة تلقائيًا داخل المتصفح.<br>
          في المرحلة القادمة نضيف الحضور والغياب والتقارير.
        </div>
      </section>

      <section class="card">
        <div class="topbar">
          <h2 style="margin:0;">قائمة الطلاب</h2>
          <div class="stats">
            <div class="stat">
              <div class="stat-num" id="totalStudents">0</div>
              <div class="stat-label">إجمالي الطلاب</div>
            </div>
            <div class="stat">
              <div class="stat-num" id="filteredStudents">0</div>
              <div class="stat-label">النتائج المعروضة</div>
            </div>
          </div>
        </div>

        <div class="searchbar">
          <input id="searchInput" type="text" placeholder="ابحث باسم الطالب..." oninput="renderStudents()">
          <select id="filterGrade" onchange="renderStudents()">
            <option value="">كل الصفوف</option>
            <option>الأول متوسط</option>
            <option>الثاني متوسط</option>
            <option>الثالث متوسط</option>
            <option>الأول ثانوي</option>
            <option>الثاني ثانوي</option>
            <option>الثالث ثانوي</option>
          </select>
          <select id="filterClass" onchange="renderStudents()">
            <option value="">كل الشعب</option>
            <option>أ</option>
            <option>ب</option>
            <option>ج</option>
            <option>د</option>
          </select>
        </div>

        <div class="btns" style="margin-bottom:18px;">
          <button class="btn-clear" onclick="clearAllStudents()">حذف جميع الطلاب</button>
        </div>

        <div id="studentList" class="student-list"></div>
      </section>
    </div>
  </div>

  <script>
    let students = JSON.parse(localStorage.getItem("teacher_platform_students") || "[]");
    let editingId = null;

    function saveStudents(){
      localStorage.setItem("teacher_platform_students", JSON.stringify(students));
    }

    function generateId(){
      return Date.now() + Math.floor(Math.random() * 1000);
    }

    function normalizeText(text){
      return (text || "").toString().trim().toLowerCase();
    }

    function submitStudent(){
      const name = document.getElementById("studentName").value.trim();
      const grade = document.getElementById("studentGrade").value;
      const section = document.getElementById("studentClass").value;
      const phone = document.getElementById("parentPhone").value.trim();

      if(!name){
        alert("اكتب اسم الطالب");
        return;
      }
      if(!grade){
        alert("اختر الصف");
        return;
      }
      if(!section){
        alert("اختر الشعبة");
        return;
      }

      if(editingId){
        const index = students.findIndex(s => s.id === editingId);
        if(index !== -1){
          students[index] = {
            ...students[index],
            name,
            grade,
            section,
            phone
          };
        }
      } else {
        students.unshift({
          id: generateId(),
          name,
          grade,
          section,
          phone,
          createdAt: new Date().toLocaleString("ar-SA")
        });
      }

      saveStudents();
      resetForm();
      renderStudents();
    }

    function editStudent(id){
      const student = students.find(s => s.id === id);
      if(!student) return;

      editingId = id;
      document.getElementById("studentName").value = student.name;
      document.getElementById("studentGrade").value = student.grade;
      document.getElementById("studentClass").value = student.section;
      document.getElementById("parentPhone").value = student.phone || "";

      document.getElementById("formTitle").textContent = "تعديل بيانات الطالب";
      document.getElementById("mainBtn").textContent = "حفظ التعديلات";
      document.getElementById("mainBtn").className = "btn-save";
      document.getElementById("cancelBtn").style.display = "inline-block";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteStudent(id){
      const student = students.find(s => s.id === id);
      if(!student) return;

      if(confirm("هل تريد حذف الطالب: " + student.name + " ؟")){
        students = students.filter(s => s.id !== id);
        saveStudents();
        if(editingId === id) resetForm();
        renderStudents();
      }
    }

    function clearAllStudents(){
      if(!students.length) return;
      if(confirm("هل تريد حذف جميع الطلاب؟")){
        students = [];
        saveStudents();
        resetForm();
        renderStudents();
      }
    }

    function cancelEdit(){
      resetForm();
    }

    function resetForm(){
      editingId = null;
      document.getElementById("studentName").value = "";
      document.getElementById("studentGrade").value = "";
      document.getElementById("studentClass").value = "";
      document.getElementById("parentPhone").value = "";

      document.getElementById("formTitle").textContent = "إضافة طالب جديد";
      document.getElementById("mainBtn").textContent = "إضافة الطالب";
      document.getElementById("mainBtn").className = "btn-add";
      document.getElementById("cancelBtn").style.display = "none";
    }

    function renderStudents(){
      const list = document.getElementById("studentList");
      const search = normalizeText(document.getElementById("searchInput").value);
      const gradeFilter = document.getElementById("filterGrade").value;
      const classFilter = document.getElementById("filterClass").value;

      const filtered = students.filter(student => {
        const matchName = normalizeText(student.name).includes(search);
        const matchGrade = !gradeFilter || student.grade === gradeFilter;
        const matchClass = !classFilter || student.section === classFilter;
        return matchName && matchGrade && matchClass;
      });

      document.getElementById("totalStudents").textContent = students.length;
      document.getElementById("filteredStudents").textContent = filtered.length;

      if(!filtered.length){
        list.innerHTML = `<div class="empty">لا توجد نتائج مطابقة</div>`;
        return;
      }

      list.innerHTML = filtered.map(student => `
        <div class="student">
          <div>
            <div class="student-name">${student.name}</div>
            <div class="meta">
              <span class="badge">${student.grade}</span>
              <span>الشعبة: ${student.section}</span>
              <span>ولي الأمر: ${student.phone || "غير مضاف"}</span>
            </div>
          </div>
          <div class="actions">
            <button class="btn-edit" onclick="editStudent(${student.id})">تعديل</button>
            <button class="btn-delete" onclick="deleteStudent(${student.id})">حذف</button>
          </div>
        </div>
      `).join("");
    }

    document.getElementById("studentName").addEventListener("keydown", function(e){
      if(e.key === "Enter") submitStudent();
    });

    document.getElementById("parentPhone").addEventListener("keydown", function(e){
      if(e.key === "Enter") submitStudent();
    });

    renderStudents();
  </script>
</body>
</html>
