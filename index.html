<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منصة الأستاذ نواف البدراني - مدرسة الراجحية</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #081225, #1b2d4a);
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      padding: 24px 16px;
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }

    .wrap {
      max-width: 1200px;
      margin: 30px auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(7, 18, 39, 0.88);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      border: 1px solid rgba(255,255,255,.06);
    }

    h2 {
      margin: 0 0 20px;
      font-size: 26px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    input {
      flex: 1;
      min-width: 220px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      outline: none;
      background: #f3f4f6;
      color: #111827;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 17px;
      cursor: pointer;
      color: white;
      transition: .2s;
    }

    button:hover { transform: translateY(-1px); }

    .btn-add { background: #22c55e; }
    .btn-add:hover { background: #16a34a; }

    .btn-delete { background: #ef4444; }
    .btn-delete:hover { background: #dc2626; }

    .student-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }

    .student {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.06);
    }

    .student-name {
      font-size: 20px;
      font-weight: 600;
      word-break: break-word;
    }

    .empty {
      opacity: .8;
      font-size: 18px;
      padding: 8px 0;
    }

    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .count {
      font-size: 18px;
      color: #cbd5e1;
    }

    @media (max-width: 700px) {
      header { font-size: 22px; }
      h2 { font-size: 22px; }
      .student-name { font-size: 18px; }
      button, input { font-size: 16px; }
    }
  </style>
</head>
<body>

  <header>منصة الأستاذ نواف البدراني - مدرسة الراجحية</header>

  <div class="wrap">
    <div class="grid">
      <section class="card">
        <h2>إضافة طالب</h2>
        <div class="row">
          <input id="studentName" type="text" placeholder="اسم الطالب" />
          <button class="btn-add" onclick="addStudent()">إضافة</button>
        </div>
      </section>

      <section class="card">
        <div class="top-actions">
          <h2 style="margin:0;">الطلاب</h2>
          <div class="count" id="studentCount">عدد الطلاب: 0</div>
        </div>

        <div id="studentList" class="student-list"></div>

        <div style="margin-top:18px;">
          <button class="btn-delete" onclick="clearAll()">حذف الكل</button>
        </div>
      </section>
    </div>
  </div>

  <script>
    let students = JSON.parse(localStorage.getItem("students") || "[]");
    let counter = students.length ? Math.max(...students.map(s => s.id)) + 1 : 1;

    function saveStudents() {
      localStorage.setItem("students", JSON.stringify(students));
    }

    function updateCount() {
      document.getElementById("studentCount").textContent = "عدد الطلاب: " + students.length;
    }

    function renderStudents() {
      const list = document.getElementById("studentList");
      list.innerHTML = "";

      if (students.length === 0) {
        list.innerHTML = '<div class="empty">لا يوجد طلاب حالياً</div>';
        updateCount();
        return;
      }

      students.forEach(student => {
        const item = document.createElement("div");
        item.className = "student";

        const name = document.createElement("div");
        name.className = "student-name";
        name.textContent = student.name;

        const actions = document.createElement("div");
        const delBtn = document.createElement("button");
        delBtn.className = "btn-delete";
        delBtn.textContent = "حذف";
        delBtn.onclick = () => removeStudent(student.id);

        actions.appendChild(delBtn);
        item.appendChild(name);
        item.appendChild(actions);
        list.appendChild(item);
      });

      updateCount();
    }

    function addStudent() {
      const input = document.getElementById("studentName");
      const name = input.value.trim();

      if (!name) {
        alert("اكتب اسم الطالب أولاً");
        input.focus();
        return;
      }

      students.push({
        id: counter++,
        name: name
      });

      saveStudents();
      renderStudents();
      input.value = "";
      input.focus();
    }

    function removeStudent(id) {
      students = students.filter(student => student.id !== id);
      saveStudents();
      renderStudents();
    }

    function clearAll() {
      if (!students.length) return;

      if (confirm("هل أنت متأكد من حذف جميع الطلاب؟")) {
        students = [];
        localStorage.removeItem("students");
        renderStudents();
      }
    }

    document.getElementById("studentName").addEventListener("keydown", function(e) {
      if (e.key === "Enter") addStudent();
    });

    renderStudents();
  </script>
</body>
</html>
